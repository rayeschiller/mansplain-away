<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mansplain Away</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  color: #fff;
  overflow-x: hidden;
}

h1 {
  font-size: clamp(1.3rem, 4vw, 1.8rem);
  font-weight: 800;
  margin-bottom: 0.3rem;
  text-align: center;
  letter-spacing: -0.5px;
}

.subtitle {
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 2.5rem;
  text-align: center;
}

.btn-wrap {
  position: relative;
  margin-bottom: 2rem;
}

.ring {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  background: conic-gradient(#c0392b, #8e0000, #c0392b);
  z-index: 0;
}

.ring-inner {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: #1a1a1a;
  z-index: 1;
}

.main-btn {
  position: relative;
  z-index: 2;
  width: 190px;
  height: 190px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle at 38% 32%, #e84040, #9b0000);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1.25;
  box-shadow: 0 8px 0 #5a0000, 0 14px 30px rgba(0,0,0,0.6);
  transition: top 0.07s, box-shadow 0.07s, transform 0.07s;
  top: 0;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.main-btn:active, .main-btn.pressed {
  top: 7px;
  box-shadow: 0 1px 0 #5a0000, 0 4px 12px rgba(0,0,0,0.5);
  transform: scale(0.96);
}

.counter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
}

.counter-label {
  font-size: 0.8rem;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.counter-num {
  font-size: 1.6rem;
  font-weight: 900;
  color: #e84040;
  transition: transform 0.15s;
}

.counter-num.bump { transform: scale(1.4); }

.card {
  background: #1c1c1c;
  border: 1px solid #2e2e2e;
  border-radius: 16px;
  padding: 1.4rem 1.6rem;
  max-width: 440px;
  width: 100%;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.25s, transform 0.25s;
}

.card.show { opacity: 1; transform: translateY(0); }

.card-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #e84040;
}

.comeback-text {
  font-size: 1rem;
  line-height: 1.6;
  color: #ddd;
  font-style: italic;
}

.loading-dots { display: flex; gap: 6px; align-items: center; padding: 6px 0; }
.dot {
  width: 7px; height: 7px; border-radius: 50%; background: #e84040;
  animation: bounce 0.85s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%,80%,100% { transform:scale(0.55); opacity:0.35; }
  40% { transform:scale(1); opacity:1; }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-10px) rotate(-2deg); }
  30% { transform: translateX(10px) rotate(2deg); }
  45% { transform: translateX(-8px); }
  60% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
  90% { transform: translateX(4px); }
}

.shaking { animation: shake 0.55s ease; }

.spark {
  position: fixed;
  pointer-events: none;
  border-radius: 50%;
  animation: sparkfly 0.7s ease-out forwards;
}
@keyframes sparkfly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
}
</style>
</head>
<body>

<h1>🚨 Mansplain Away</h1>
<p class="subtitle">Press when a man is explaining something to you that you didn't ask for.</p>

<div class="btn-wrap" id="btnWrap">
  <div class="ring"></div>
  <div class="ring-inner"></div>
  <button class="main-btn" id="btn" aria-label="Generate comeback" onclick="handlePress()">MAKE IT<br>STOP</button>
</div>

<div class="counter-row">
  <span class="counter-label">Times today:</span>
  <span class="counter-num" id="counter">0</span>
</div>

<div class="card" id="card">
  <div class="card-label">Say this back:</div>
  <div id="output"></div>
</div>

<script>
const COOLDOWN_MS = 2000;
const STORAGE_KEY = 'mansplain_count';
const STORAGE_DATE_KEY = 'mansplain_date';

let isLoading = false;

const btn = document.getElementById('btn');
const card = document.getElementById('card');
const output = document.getElementById('output');
const counterEl = document.getElementById('counter');
const btnWrap = document.getElementById('btnWrap');

// Persist counter per calendar day
function loadCounter() {
  const today = new Date().toDateString();
  if (localStorage.getItem(STORAGE_DATE_KEY) !== today) {
    localStorage.setItem(STORAGE_DATE_KEY, today);
    localStorage.setItem(STORAGE_KEY, '0');
  }
  return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
}

let count = loadCounter();
counterEl.textContent = count;

function spawnSparks() {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (i / 14) * 2 * Math.PI + Math.random() * 0.4;
    const dist = 60 + Math.random() * 60;
    const size = 5 + Math.random() * 6;
    s.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${['#e84040','#ff6b6b','#ffcc00','#ff8c00'][Math.floor(Math.random()*4)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

function bumpCounter() {
  count++;
  localStorage.setItem(STORAGE_KEY, String(count));
  counterEl.textContent = count;
  counterEl.classList.add('bump');
  setTimeout(() => counterEl.classList.remove('bump'), 200);
}

function shakeButton() {
  btnWrap.classList.add('shaking');
  btnWrap.addEventListener('animationend', () => btnWrap.classList.remove('shaking'), { once: true });
}

function playBuzzer() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.28, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function speakText(text) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.95;
  utt.pitch = 1.1;
  const trySpeak = () => {
    const voices = speechSynthesis.getVoices();
    const femVoice = voices.find(v => /female|woman|zira|samantha|victoria|karen|moira|tessa|fiona/i.test(v.name));
    if (femVoice) utt.voice = femVoice;
    speechSynthesis.speak(utt);
  };
  speechSynthesis.getVoices().length ? trySpeak() : speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
}

async function handlePress() {
  if (isLoading) return;
  isLoading = true;
  btn.disabled = true;

  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 200);

  spawnSparks();
  shakeButton();
  playBuzzer();
  bumpCounter();

  card.classList.add('show');
  output.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  try {
    const res = await fetch('/api/comeback', { method: 'POST' });
    if (!res.ok) throw new Error('Request failed');
    const data = await res.json();
    const text = data.text || 'Fascinating. I\'ll pretend I haven\'t known that for years.';
    output.innerHTML = `<span class="comeback-text">"${text}"</span>`;
    speakText(text);
  } catch(e) {
    const fallback = 'Fascinating. I\'ll pretend I haven\'t known that for years.';
    output.innerHTML = `<span class="comeback-text">"${fallback}"</span>`;
    speakText(fallback);
  }

  setTimeout(() => {
    isLoading = false;
    btn.disabled = false;
  }, COOLDOWN_MS);
}
</script>
</body>
</html>
